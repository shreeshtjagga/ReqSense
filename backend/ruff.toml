# ruff.toml — linting configuration for ReqSense AI backend
target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "B008",   # do not perform function calls in default argument (FastAPI Depends pattern)
    "SIM108", # ternary — sometimes less readable
]

[lint.per-file-ignores]
"tests/*" = ["S101"]   # assert is fine in tests
