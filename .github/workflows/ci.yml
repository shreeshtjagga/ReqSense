name: CI

on:
  push:
    branches: [main, shreesht, develop]
  pull_request:
    branches: [main, shreesht]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff aiosqlite

      - name: Ruff lint (fast)
        run: ruff check app/ tests/ --output-format=github

      - name: Run tests
        env:
          # Tests inject their own env vars via conftest.py — these exist
          # only so Settings() doesn't fail if conftest hasn't injected yet.
          DATABASE_URL: "postgresql+asyncpg://u:p@localhost/reqsense_test"
          REDIS_URL: "redis://localhost:6379"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
          SECRET_KEY: "ci-secret-key-min-32-chars-placeholder!!"
          GROQ_API_KEY: "ci-groq-key"
          SENDGRID_API_KEY: "ci-sendgrid-key"
          FROM_EMAIL: "ci@example.com"
          S3_BUCKET_NAME: "ci-bucket"
          S3_ACCESS_KEY_ID: "ci-key-id"
          S3_SECRET_ACCESS_KEY: "ci-secret"
          CHROMA_MODE: "local"
          CHROMA_PERSIST_DIRECTORY: "/tmp/chroma_ci"
          SENTRY_DSN: ""
          ENV: "development"
        run: |
          pytest tests/ -v --tb=short

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"
